<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glass panels -->
  <rect x="2" y="6" width="34" height="48" rx="2" fill="#2d6db5"/>
  <rect x="12" y="3" width="34" height="48" rx="2" fill="#5ec4d4" opacity="0.85"/>
  <rect x="22" y="0" width="34" height="48" rx="2" fill="#8ee0ea" opacity="0.7"/>
  <!-- P letter -->
  <text x="18" y="38" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">P</text>
  <!-- & symbol -->
  <text x="36" y="46" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">&amp;</text>
  <!-- J letter -->
  <text x="46" y="38" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">J</text>
  <!-- P & J GLASS text -->
  <text x="72" y="28" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="white" letter-spacing="4">P &amp; J G L A S S</text>
  <!-- www.pj-glass.co.uk -->
  <text x="72" y="46" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="2">www.pj-glass.co.uk</text>
</svg>
